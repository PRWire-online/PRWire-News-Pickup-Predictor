name: Heartbeat

on:
  schedule:
    - cron: "0 9 */2 * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update heartbeat
        run: |
          echo "heartbeat: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > heartbeat.txt

      - name: Commit heartbeat
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: heartbeat update $(date -u +%Y-%m-%d)"
          file_pattern: heartbeat.txt
